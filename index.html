<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ffffff">
  <title>冰箱管家</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-inner">
      <div class="header-left">
        <span class="app-logo">🧊</span>
        <h1 class="app-name">冰箱管家</h1>
      </div>
      <div class="header-right">
        <button class="icon-btn" id="btn-toggle-view" title="切换视图">
          <svg id="icon-grid" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          <svg id="icon-list" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="hidden"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor"/><circle cx="3" cy="12" r="1" fill="currentColor"/><circle cx="3" cy="18" r="1" fill="currentColor"/></svg>
        </button>
        <button class="icon-btn" id="btn-open-settings" title="设置">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06-.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <!-- ── Filter Tabs ── -->
  <div class="filter-bar">
    <button class="filter-tab active" data-filter="all">全部 <span class="tab-badge" id="badge-all">0</span></button>
    <button class="filter-tab" data-filter="fresh">新鲜 <span class="tab-badge fresh" id="badge-fresh">0</span></button>
    <button class="filter-tab" data-filter="soon">快过期 <span class="tab-badge soon" id="badge-soon">0</span></button>
    <button class="filter-tab" data-filter="expired">已过期 <span class="tab-badge expired" id="badge-expired">0</span></button>
  </div>

  <!-- ── Main Content ── -->
  <main class="main-content">
    <div id="item-container" class="item-grid"></div>
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-emoji">🧊</div>
      <p class="empty-title">冰箱是空的</p>
      <p class="empty-hint">点击 <strong>+</strong> 手动添加食材<br>或扫描超市小票自动录入</p>
    </div>
  </main>

  <!-- ── Bottom Nav ── -->
  <nav class="bottom-nav">
    <button class="nav-action" id="btn-open-scan">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v3M15 3v3M3 9h3M3 15h3M18 9h3M18 15h3M9 18v3M15 18v3"/></svg>
      <span>扫描小票</span>
    </button>
    <button class="fab" id="btn-add-item">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </nav>

  <!-- ── Backdrop ── -->
  <div id="modal-backdrop" class="modal-backdrop hidden"></div>

  <!-- ── Add / Edit Sheet ── -->
  <div id="sheet-item" class="bottom-sheet hidden">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2 id="sheet-item-title">添加食材</h2>
      <button class="icon-btn" id="btn-close-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <form id="form-item" autocomplete="off">
        <input type="hidden" id="input-id">

        <div class="form-group">
          <label class="form-label">名称 *</label>
          <input class="form-input" type="text" id="input-name" placeholder="例：西红柿、鸡蛋" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">分类</label>
            <select class="form-input" id="input-category">
              <option value="蔬菜">🥦 蔬菜</option>
              <option value="水果">🍎 水果</option>
              <option value="肉类">🥩 肉类</option>
              <option value="乳制品">🥛 乳制品</option>
              <option value="调料">🧂 调料</option>
              <option value="主食">🍚 主食</option>
              <option value="其他">📦 其他</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">数量</label>
            <input class="form-input" type="text" id="input-quantity" placeholder="如 2个 / 500g">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label">购买日期</label>
            <input class="form-input" type="date" id="input-purchase-date">
          </div>
          <div class="form-group">
            <label class="form-label">到期日期</label>
            <input class="form-input" type="date" id="input-expiry-date">
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">价格 (¥)</label>
          <input class="form-input" type="number" id="input-price" placeholder="0.00" step="0.01" min="0">
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-danger-ghost hidden" id="btn-delete-item">删除</button>
          <button type="submit" class="btn btn-primary flex-1">保存</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Scan Sheet ── -->
  <div id="sheet-scan" class="bottom-sheet hidden">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>扫描小票</h2>
      <button class="icon-btn" id="btn-close-scan">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body" id="scan-body"></div>
  </div>

  <!-- ── Settings Sheet ── -->
  <div id="sheet-settings" class="bottom-sheet hidden">
    <div class="sheet-handle"></div>
    <div class="sheet-header">
      <h2>设置</h2>
      <button class="icon-btn" id="btn-close-settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="sheet-body">
      <div class="settings-section">
        <p class="settings-label">小票 OCR 识别</p>
        <div class="form-group">
          <label class="form-label">Anthropic API Key</label>
          <div class="input-with-btn">
            <input class="form-input" type="password" id="input-api-key" placeholder="sk-ant-api03-...">
            <button type="button" class="icon-btn" id="btn-toggle-key">
              <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <p class="form-hint">API Key 仅保存在本地，不会上传到任何服务器</p>
        </div>
        <button class="btn btn-primary w-full" id="btn-save-key">保存 API Key</button>
      </div>

      <div class="settings-section">
        <p class="settings-label">数据管理</p>
        <button class="btn btn-ghost w-full" id="btn-export">📤 导出数据 (JSON)</button>
        <button class="btn btn-danger-ghost w-full" id="btn-clear-all">🗑 清空所有数据</button>
      </div>

      <div class="settings-section">
        <p class="settings-label">关于</p>
        <p class="settings-about">冰箱管家 v1.0<br>小票识别由 Claude claude-sonnet-4-6 驱动<br>数据存储于本地浏览器</p>
      </div>
    </div>
  </div>

  <!-- Hidden file input -->
  <input type="file" id="file-input" accept="image/*" style="display:none">

</div><!-- #app -->
<script src="main.js"></script>
</body>
</html>
